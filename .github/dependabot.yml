---
version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: daily
      timezone: Europe/London
      time: "06:00"
    cooldown:
      default-days: 7
      semver-minor-days: 9
      semver-major-days: 11
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      timezone: Europe/London
      time: "06:00"
    cooldown:
      default-days: 7
      semver-minor-days: 9
      semver-major-days: 11
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directories:
      - .github/actions/*
      - /
    schedule:
      interval: daily
      timezone: Europe/London
      time: "06:00"
    cooldown:
      default-days: 7
    labels:
      - dependencies
